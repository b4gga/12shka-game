<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Грибок против Марио</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-wrapper">
  <div class="game-container">
    <header class="hud">
      <div class="hud-left">
        <span>Очки: <span id="score">0</span></span>
        <span>Жизни: <span id="lives">3</span></span>
      </div>
      <div class="hud-right">
        <span id="bonusIndicator"></span>
        <span>Уровень: <span id="level">1</span></span>
      </div>
    </header>

    <canvas id="gameCanvas" width="960" height="540"></canvas>

    <div class="overlay" id="startScreen">
      <div class="panel">
        <h1>Грибок против Марио</h1>
        <p>Ты — боевой грибок. Прыгай на Марио сверху, уворачивайся от столкновений сбоку.</p>
        <label for="nicknameInput" class="nickname-label">Никнейм</label>
        <input type="text" id="nicknameInput" class="nickname-input" maxlength="20" placeholder="Введи имя">
        <p class="controls">
          ПК: ← → или A D — ходить, пробел — прыжок. Телефон: экранные кнопки внизу.
        </p>
        <button id="startButton">Играть</button>
        <div class="highscores" id="highscoresStart">
          <h3>Рекорды</h3>
          <ol id="highscoresListStart"></ol>
        </div>
      </div>
    </div>

    <div class="overlay hidden" id="gameOverScreen">
      <div class="panel">
        <h2 id="gameOverTitle">Игра окончена</h2>
        <p>Очки: <span id="finalScore">0</span></p>
        <p id="newRecordMsg" class="new-record hidden">Новый рекорд!</p>
        <div class="highscores" id="highscoresGameOver">
          <h3>Рекорды</h3>
          <ol id="highscoresListGameOver"></ol>
        </div>
        <button id="restartButton">Играть снова</button>
      </div>
    </div>
  </div>

  <div class="mobile-controls" id="mobileControls">
    <div class="dpad">
      <button type="button" class="btn-mobile btn-left" data-key="arrowleft" aria-label="Влево">←</button>
      <button type="button" class="btn-mobile btn-right" data-key="arrowright" aria-label="Вправо">→</button>
    </div>
    <button type="button" class="btn-mobile btn-jump" data-key=" " aria-label="Прыжок">Прыжок</button>
  </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="main.js"></script>
</body>
</html>
